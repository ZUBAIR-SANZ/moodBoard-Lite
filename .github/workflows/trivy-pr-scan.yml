name: Trivy Vulnerability Scan on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write        # post comments + request changes
  security-events: write      # upload SARIF (optional)

jobs:
  trivy-scan:
    name: Scan & Report Vulnerabilities
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout PR code ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Run Trivy fs scan → JSON output ──────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "trivy-report.json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "0"          # don't fail the step; we handle logic in Python

      # ── 3. Parse report + post PR comment ───────────────────────────────
      - name: Parse Trivy report and post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BOT_REVIEWER: ${{ github.actor }}   # used to avoid self-review error
        run: |
          pip install requests --quiet
          python scripts/trivy_pr_comment.py

      # ── 4. Upload Trivy JSON as artifact (for audit trail) ───────────────
      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ github.event.pull_request.number }}
          path: trivy-report.json
          retention-days: 30
