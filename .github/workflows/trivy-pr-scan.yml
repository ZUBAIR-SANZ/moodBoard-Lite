name: Dependabot Vulnerability Scan on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

# If a newer commit lands on the same PR while a scan is running,
# cancel the older run so you don't get two thread updates racing.
concurrency:
  group: dependabot-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read          # no branch push; checkout only
  pull-requests: write    # post/update the resolvable review thread + resolve it

jobs:
  dependabot-scan:
    # ⚠️ This job NAME is the required status check in branch protection
    # ("Scan & Report Vulnerabilities"). Do NOT rename it.
    #
    # NOTE ON GATING: this check no longer fails on severity. The merge gate is
    # now the resolvable thread + the "Require conversation resolution before
    # merging" branch-protection setting. This check only goes red if the scan
    # itself errors (missing PAT scope, Dependabot disabled, API failure) — a
    # fail-closed backstop. Keep it required.
    name: Scan & Report Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Fetch Dependabot alerts and post resolvable thread
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPENDABOT_PAT: ${{ secrets.DEPENDABOT_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: python scripts/trivy_pr_comment.py
